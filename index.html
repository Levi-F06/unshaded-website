<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unshaded</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

  <header id="home">
    <img src="assets/logo.png" alt="logo for Unshaded" id="logo">
  </header>
  <nav id="banner">
    <a href="#home">
      <p class="nav-item">Home</p>
    </a>
    <a href="#releases">
      <p class="nav-item">Releases</p>
    </a>
    <p class="nav-item">Contact</p>
    <p class="nav-item">Upcoming Shows</p>
    <p class="nav-item">Merch</p>
  </nav>

  <main>

    <section id="mainPhoto">
      <img src="assets/main.JPG" id="mainBand" alt="main photo for Unshaded">
      <img src="assets/main-red.JPG" id="mainBandOverlay" alt="red overlay photo for Unshaded">
    </section>

    <section id="releases">
      <div>
        <h1>Listen to <span class="pulse-text">name of album</span> now!</h1>
        <a class="hover-red" href=""><i class="bi bi-spotify"></i> spotify</a>
        <a class="hover-red" href=""><i class="bi bi-apple-music"></i> apple music</a>
        <a class="hover-red" href=""><i class="bi bi-youtube"></i> youtube</a>
      </div>
      <img src="./assets/album.jpeg" alt="Latest album of unshaded">
    </section>

    <section id="socials">
      <h1>Follow our <span class="pulse-text">socials</span></h1>
      <nav>
        <i class="hover-red bi bi-facebook"></i>
        <i class="hover-red bi bi-tiktok"></i>
        <i class="hover-red bi bi-instagram"></i>
      </nav>
    </section>

  </main>
  <script src="./script.js"></script>
</body>

</html>
